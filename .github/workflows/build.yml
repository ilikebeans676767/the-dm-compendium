name: Build and release plugin

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Get version from manifest
        id: version
        run: echo "version=$(jq -r '.version' manifest.json)" >> $GITHUB_OUTPUT

      - name: Create tar archive with all assets
        run: tar czf plugin-assets.tar.gz main.js toolkit_search.js manifest.json styles.css templates/ data/

      - name: Delete existing release if it exists
        run: |
          gh release delete ${{ steps.version.outputs.version }} --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release with all assets
        run: |
          # Build list of all files to upload
          FILES="main.js toolkit_search.js manifest.json styles.css"
          FILES="$FILES $(find templates -type f | sort)"
          FILES="$FILES $(find data -type f | sort)"
          
          gh release create ${{ steps.version.outputs.version }} $FILES \
            plugin-assets.tar.gz \
            --title "${{ steps.version.outputs.version }}" \
            --notes "Auto-built from main"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}